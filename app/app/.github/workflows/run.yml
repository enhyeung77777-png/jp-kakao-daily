name: Send Kakao Message

on:
  schedule:
    - cron: "30 23 * * *"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Python
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          python app/main.py
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
